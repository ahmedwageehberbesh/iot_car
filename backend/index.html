<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Car Advanced Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        body {
            margin: 0; padding: 20px;
            font-family: 'Cairo', sans-serif;
            background-color: #121212; color: #ffffff;
            display: flex; flex-direction: column; align-items: center;
        }

        h1 { color: #00e5ff; text-shadow: 0 0 10px rgba(0, 229, 255, 0.5); }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; width: 90%; max-width: 1200px; margin-bottom: 30px;
        }

        .card {
            background-color: #1e1e1e; border-radius: 15px; padding: 20px;
            text-align: center; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
        }

        .value { font-size: 32px; font-weight: bold; color: #00e5ff; display: block; }
        .unit { font-size: 16px; color: #888; }

        .charts-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px; width: 90%; max-width: 1200px;
        }

        .chart-box {
            background-color: #1e1e1e; border-radius: 15px; padding: 20px;
            border: 1px solid #333; height: 300px;
        }

        .status { margin-top: 20px; font-size: 14px; color: #00ff00; }
    </style>
</head>

<body>

    <h1>لوحة تحكم السيارة الذكية 🚗</h1>

    <div class="stats-container">
        <div class="card">
            <h2>المسافة الحالية</h2>
            <span class="value" id="dist-val">--</span>
            <span class="unit">سم</span>
        </div>
        <div class="card">
            <h2>السرعة الحالية</h2>
            <span class="value" id="speed-val" style="color: #ff9100;">--</span>
            <span class="unit">سم / ثانية</span>
        </div>
        <div class="card">
            <h2>متوسط المسافة</h2>
            <span class="value" id="avg-dist">--</span>
            <span class="unit">سم</span>
        </div>
        <div class="card">
            <h2>الاتجاه</h2>
            <span class="value" id="dir-val" style="font-size: 24px;">--</span>
        </div>
    </div>

    <div class="charts-container">
        <div class="chart-box">
            <canvas id="distanceChart"></canvas>
        </div>
        <div class="chart-box">
            <canvas id="speedChart"></canvas>
        </div>
    </div>

    <div class="status" id="connection-status">جاري المزامنة...</div>

    <script>
        const API_URL = "http://127.0.0.1:8000/api/all";
        let lastId = null;

        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            scales: { 
                y: { beginAtZero: true, grid: { color: '#333' } },
                x: { grid: { display: false }, ticks: { color: '#888' } }
            },
            plugins: { 
                legend: { position: 'top', labels: { color: '#fff', font: { family: 'Cairo', size: 10 } } } 
            }
        };

        // إعداد جراف المسافة
        const distChart = new Chart(document.getElementById('distanceChart'), {
            type: 'line',
            data: { 
                labels: [], 
                datasets: [
                    { 
                        label: 'المسافة اللحظية', 
                        data: [], 
                        borderColor: '#00e5ff', 
                        tension: 0.3, 
                        fill: true, 
                        backgroundColor: 'rgba(0, 229, 255, 0.1)' 
                    },
                    { 
                        label: 'متوسط المسافة', 
                        data: [], 
                        borderColor: '#00e5ff', 
                        borderDash: [5, 5], // جعل الخط "داش"
                        borderWidth: 2,
                        pointRadius: 0, // إخفاء النقط في خط المتوسط
                        fill: false 
                    }
                ] 
            },
            options: commonOptions
        });

        // إعداد جراف السرعة
        const speedChart = new Chart(document.getElementById('speedChart'), {
            type: 'line',
            data: { 
                labels: [], 
                datasets: [
                    { 
                        label: 'السرعة اللحظية', 
                        data: [], 
                        borderColor: '#ff9100', 
                        backgroundColor: '#ff9100', 
                        tension: 0.4 
                    },
                    { 
                        label: 'متوسط السرعة', 
                        data: [], 
                        borderColor: '#ff4444', 
                        borderDash: [10, 5], // خط داش
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: false 
                    }
                ] 
            },
            options: commonOptions
        });

        async function updateDashboard() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                if (data.length === 0) return;

                const latest = data[0];

                // 1. تحديث الكروت
                document.getElementById('dist-val').innerText = latest.distance;
                document.getElementById('speed-val').innerText = latest.speed;
                document.getElementById('dir-val').innerText = latest.direction;

                // 2. حساب المتوسطات العامة
                const avgDist = data.reduce((sum, item) => sum + item.distance, 0) / data.length;
                const avgSpeed = data.reduce((sum, item) => sum + item.speed, 0) / data.length;
                document.getElementById('avg-dist').innerText = avgDist.toFixed(1);

                // 3. تحديث الجرافات
                if (latest.id !== lastId) {
                    const historical = data.slice(0, 15).reverse();
                    const labels = historical.map(i => i.timestamp.split(' ')[1]);

                    // تحديث جراف المسافة
                    distChart.data.labels = labels;
                    distChart.data.datasets[0].data = historical.map(i => i.distance);
                    distChart.data.datasets[1].data = Array(labels.length).fill(avgDist); // خط المتوسط
                    distChart.update();

                    // تحديث جراف السرعة
                    speedChart.data.labels = labels;
                    speedChart.data.datasets[0].data = historical.map(i => i.speed);
                    speedChart.data.datasets[1].data = Array(labels.length).fill(avgSpeed); // خط المتوسط
                    speedChart.update();

                    lastId = latest.id;
                }

                document.getElementById('connection-status').innerText = `🟢 متصل - سجل ID: ${latest.id}`;
            } catch (e) {
                document.getElementById('connection-status').innerText = "🔴 خطأ في المزامنة";
            }
        }

        setInterval(updateDashboard, 1000);
    </script>
</body>
</html>
